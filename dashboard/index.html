<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener Dashboard</title>
  <!-- React and ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {font-family: Arial, sans-serif; margin: 2rem;}
    .form-group {margin-bottom: 1rem;}
    label {display: block; margin-bottom: 0.5rem;}
    input, button {padding: 0.5rem; width: 100%;}
    button {cursor: pointer;}
    .result {margin-top: 1rem;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Shorten form component (only)
    function ShortenForm() {
      const [url, setUrl] = useState('');
      const [customSlug, setCustomSlug] = useState('');
      const [expiresAt, setExpiresAt] = useState('');
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError(null);
        setResult(null);
        const payload = { url };
        if (customSlug) payload.customSlug = customSlug;
        if (expiresAt) payload.expiresAt = expiresAt;
        try {
          const resp = await fetch('/api/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) {
            setError(data.error || 'Failed to shorten');
          } else {
            setResult(data);
          }
        } catch (e) {
          setError('Network error');
        }
      };

      return (
        <div>
          <h2>Shorten a URL</h2>
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label>Long URL</label>
              <input type="url" required value={url} onChange={e => setUrl(e.target.value)} />
            </div>
            <div className="form-group">
              <label>Custom slug (optional)</label>
              <input type="text" value={customSlug} onChange={e => setCustomSlug(e.target.value)} />
            </div>
            <div className="form-group">
              <label>Expiry (ISO date, optional)</label>
              <input type="date" value={expiresAt} onChange={e => setExpiresAt(e.target.value)} />
            </div>
            <button type="submit">Shorten</button>
          </form>
          {error && <p style={{color: 'red'}}>{error}</p>}
          {result && (
            <div className="result">
              <p>Short URL: <a href={result.shortUrl} target="_blank" rel="noopener noreferrer">{result.shortUrl}</a></p>
              <p>Created at: {new Date(result.createdAt).toLocaleString()}</p>
              {result.expiresAt && <p>Expires at: {new Date(result.expiresAt).toLocaleString()}</p>}
            </div>
          )}
        </div>
      );
    }

    function App() {
      return (
        <div>
          <h1>URL Shortener Dashboard</h1>
          <ShortenForm />
          {/* Analytics view will be added in a later commit */}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
